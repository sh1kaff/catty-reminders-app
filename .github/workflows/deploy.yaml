name: CD

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get image name (lowercase)
      id: img
      run: |
        echo "name=$(echo "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Create .env file
      run: |
        echo "IMAGE_NAME=${{ steps.img.outputs.name }}" > .env
        echo "IMAGE_TAG=${{ github.sha }}" >> .env
        echo "MARIADB_ROOT_PASSWORD=mypass" >> .env
        echo "MARIADB_DATABASE=catty_reminders" >> .env
        echo "DEPLOY_REF=${{ github.sha }}" >> .env

    - name: Prepare server and copy files
      uses: appleboy/ssh-action@master
      with:
        host: ${{ vars.DEPLOY_HOST }}
        username: ${{ vars.DEPLOY_USER }}
        port: ${{ vars.DEPLOY_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: mkdir -p ~/catty-app

    - name: Copy config to WSL
      uses: appleboy/scp-action@master
      with:
        host: ${{ vars.DEPLOY_HOST }}
        username: ${{ vars.DEPLOY_USER }}
        port: ${{ vars.DEPLOY_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "docker-compose.yaml,.env"
        target: "/home/sergo/catty-app"

    - name: Deploy via Docker Compose
      uses: appleboy/ssh-action@master
      with:
        host: ${{ vars.DEPLOY_HOST }}
        username: ${{ vars.DEPLOY_USER }}
        port: ${{ vars.DEPLOY_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        env:
          DOCKER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        script: |
          cd ~/catty-app
          echo "$DOCKER_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          
          docker compose down -v --remove-orphans
          
          docker compose config
          
          docker compose pull
          docker compose up -d --force-recreate
          
          echo "Waiting for app to bind ports..."
          sleep 15
          
          docker compose ps