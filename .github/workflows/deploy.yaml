name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        # app env vars
        echo "APP_IMAGE=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}" > .env
        echo "DEPLOY_REF=${{ github.sha }}" >> .env
        echo "APP_PORT=8181" >> .env
        echo "APP_CONTAINER_NAME=catty-app" >> .env
        # database env vars
        echo "DB_CONTAINER_NAME=catty_db" >> .env
        echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD}}" >> .env
        echo "MYSQL_USER=sergo" >> .env
        echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD}}" >> .env
        echo "MYSQL_DATABASE=catty_reminders" >> .env
        echo "DB_PORT=3306" >> .env
    
    - name: Copy .env to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ vars.DEPLOY_HOST }}
        username: ${{ vars.DEPLOY_USER }}
        port: ${{ vars.DEPLOY_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: ./.env
        target: /home/sergo/catty-compose
    
    - name: Copy docker-compose.yaml to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ vars.DEPLOY_HOST }}
        username: ${{ vars.DEPLOY_USER }}
        port: ${{ vars.DEPLOY_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: ./docker-compose.yaml
        target: /home/sergo/catty-compose

    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ vars.DEPLOY_HOST }}
        username: ${{ vars.DEPLOY_USER }}
        port: ${{ vars.DEPLOY_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -x
          cd /home/sergo/catty-compose
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin #
          sudo docker compose up -d --pull always --remove-orphans --force-recreate