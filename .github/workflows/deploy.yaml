name: Deploy
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: course.prafdin.ru
          username: sergo
          port: 3163
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml,config.json"
          target: "/home/sergo/catty-reminders-app"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: sergo
          port: 3163
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          timeout: 30s
          script: |
            set -e
            cd /home/sergo/catty-reminders-app

            OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
            export DEPLOY_REF=${{ github.sha }}
            export IMAGE=ghcr.io/$OWNER/catty-reminders-app:${{ github.sha }}
            
            export DB_CONTAINER_NAME=catty-db
            export APP_CONTAINER_NAME=catty-app
            export MARIADB_ROOT_PASSWORD=${{ secrets.DB_PASS }}
            export MARIADB_USER=sergo
            export MARIADB_PASSWORD=${{ secrets.DB_PASS }}
            export MARIADB_DATABASE=catty_reminders
            export HOST_DB_PORT=3306
            export CONTAINER_DB_PORT=3306
            export HOST_APP_PORT=8181
            export CONTAINER_APP_PORT=8181

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling images..."
            docker compose pull
            
            echo "Starting containers..."
            docker compose up -d --remove-orphans --force-recreate